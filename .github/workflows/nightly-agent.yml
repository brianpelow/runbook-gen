name: Nightly agent

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Run nightly agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python scripts/nightly_agent.py
      - name: Commit agent output
        run: |
          git config user.name "runbook-gen-agent[bot]"
          git config user.email "agent@runbook-gen"
          git add -A
          git diff --staged --quiet || git commit -m "chore(agent): nightly update $(date -u +%Y-%m-%d)"
          git push